name: Test Music Sources

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install yt-dlp
        run: pip install yt-dlp requests
      - name: Run source tests
        run: python test_sources.py
